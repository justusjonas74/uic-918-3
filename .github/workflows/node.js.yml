# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint

  build-and-test:
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install asn1c
        run: |
          sudo apt-get update
          sudo apt-get install -y asn1c
      - name: Setup Emscripten
        uses: pyodide/setup-emsdk@v15
        with:
          version: 'latest'
          actions-cache-folder: 'emscripten-cache-node-${{ matrix.node-version }}'
      - run: pnpm install --frozen-lockfile
      - name: Build WASM files
        run: pnpm run build:uflex-wasm || echo "WASM build failed, continuing with tests (may use mocks)"
      - run: pnpm run --if-present build
      - run: pnpm run test:coverage
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: node-${{ join(matrix.*, '-') }}
          parallel: true

  finish:
    needs: build-and-test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          carryforward: 'node-20,node-22,node-24'
